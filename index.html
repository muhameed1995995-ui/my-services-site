<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SheikhCut Studio V4</title>
<style>
  :root{
    --bg:#050816; --card:#111827; --line:#334155; --text:#f8fafc;
    --muted:#b6c2d6; --blue:#05d9ff; --purple:#8b5cf6; --green:#16a34a;
    --red:#dc2626; --yellow:#f59e0b;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(circle at 20% 0%,rgba(5,217,255,.18),transparent 30%),
               radial-gradient(circle at 80% 10%,rgba(139,92,246,.22),transparent 35%),
               linear-gradient(145deg,#050816,#0b1020);
    color:var(--text);
    font-family:Arial,Tahoma,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    position:sticky;top:0;z-index:50;
    padding:14px;
    background:rgba(5,8,22,.93);
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(12px);
  }
  .brand{display:flex;gap:12px;align-items:center}
  .logo{
    width:48px;height:48px;border-radius:16px;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    display:grid;place-items:center;color:#06111f;font-weight:900;font-size:24px;
  }
  h1{margin:0;font-size:22px}
  .tag{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
  main{max-width:900px;margin:auto;padding:12px}
  .box{
    background:rgba(17,24,39,.95);
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 16px 40px rgba(0,0,0,.3);
  }
  .screen{
    position:relative;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.14);
    min-height:260px;
  }
  video{
    width:100%;
    min-height:260px;
    max-height:62vh;
    background:#000;
    display:block;
    object-fit:contain;
    filter:brightness(var(--brightness,1)) contrast(var(--contrast,1)) saturate(var(--saturation,1));
  }
  #placeholder{
    position:absolute; inset:0;
    display:grid; place-items:center;
    text-align:center; padding:25px;
    color:#dbeafe;
    background:#000;
    z-index:2;
    pointer-events:none;
  }
  #placeholder .icon{
    width:82px;height:82px;border-radius:26px;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    display:grid;place-items:center;margin:0 auto 14px;color:#06111f;font-size:34px;font-weight:900;
  }
  #overlayText{
    position:absolute;
    left:50%; top:74%;
    transform:translate(-50%,-50%);
    width:92%;
    text-align:center;
    font-size:34px;
    font-weight:900;
    color:#fff;
    text-shadow:0 3px 16px #000,0 1px 4px #000;
    white-space:pre-wrap;
    pointer-events:none;
    z-index:3;
    display:none;
  }
  label{display:block;color:var(--muted);font-size:14px;margin:10px 2px 6px}
  input,textarea,button{
    width:100%;
    border:0;
    border-radius:14px;
    padding:13px;
    font-size:16px;
    font-family:Arial,Tahoma,sans-serif;
  }
  input,textarea{background:#f8fafc;color:#0f172a}
  textarea{min-height:90px;resize:vertical}
  input[type=range]{padding:0;accent-color:#05d9ff}
  button{
    color:#fff;background:#29364e;font-weight:900;
    cursor:pointer;touch-action:manipulation;
    border:1px solid rgba(255,255,255,.09);
  }
  button:active{transform:scale(.98);filter:brightness(1.2)}
  .primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#06111f}
  .green{background:var(--green)}
  .red{background:var(--red)}
  .yellow{background:linear-gradient(135deg,#f59e0b,#ea580c)}
  .purple{background:#7c3aed}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .wide{grid-column:1/-1}
  .status{
    background:#020617;border:1px solid var(--line);border-radius:14px;
    padding:12px;margin-top:10px;color:#dbeafe;font-size:14px;line-height:1.8;
  }
  .timeline{
    height:50px;border-radius:16px;overflow:hidden;margin-top:10px;position:relative;
    background:linear-gradient(90deg,#263047,#57337b,#1f7c8e);
    border:1px solid rgba(255,255,255,.12);
  }
  #playhead{position:absolute;top:0;bottom:0;right:0;width:4px;background:#fff;box-shadow:0 0 16px #fff}
  .small{font-size:13px;color:var(--muted);line-height:1.8}
  @media(max-width:650px){
    main{padding:10px}
    .grid{grid-template-columns:1fr 1fr}
    video{min-height:240px}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">S</div>
    <div>
      <h1>SheikhCut Studio</h1>
      <div class="tag">V4 — أزرار مبرمجة ومفحوصة داخل الصفحة، نسخة ثابتة للهاتف</div>
    </div>
  </div>
</header>

<main>
  <section class="box">
    <label>1) اختار فيديو من الهاتف</label>
    <input id="fileInput" type="file" accept="video/*,.mp4,.mov,.m4v,.webm">

    <div class="screen">
      <video id="video" controls playsinline webkit-playsinline preload="metadata"></video>
      <div id="placeholder">
        <div>
          <div class="icon">▶</div>
          <b>اختار فيديو</b><br>
          بعد الاختيار رح يطلع هون مباشرة
        </div>
      </div>
      <div id="overlayText"></div>
    </div>

    <div class="grid">
      <button id="btnTest" class="yellow wide" type="button">فحص الأزرار</button>
      <button id="btnPlay" class="green" type="button">تشغيل</button>
      <button id="btnPause" class="red" type="button">إيقاف</button>
      <button id="btnBack" type="button">-5 ثواني</button>
      <button id="btnForward" type="button">+5 ثواني</button>
      <button id="btnStart" class="purple" type="button">بداية القص</button>
      <button id="btnEnd" class="purple" type="button">نهاية القص</button>
      <button id="btnPlayTrim" class="green wide" type="button">تشغيل الجزء المقصوص</button>
    </div>

    <div class="timeline"><div id="playhead"></div></div>
    <div id="status" class="status">جاهز. اضغط "فحص الأزرار" أولًا.</div>
  </section>

  <section class="box">
    <label>2) النص فوق الفيديو</label>
    <textarea id="textInput" placeholder="اكتب النص هنا"></textarea>

    <div class="grid">
      <button id="btnApplyText" class="primary" type="button">تطبيق النص</button>
      <button id="btnClearText" type="button">حذف النص</button>
    </div>

    <label>حجم النص</label>
    <input id="textSize" type="range" min="18" max="80" value="34">

    <label>مكان النص فوق/تحت</label>
    <input id="textPosition" type="range" min="10" max="90" value="74">
  </section>

  <section class="box">
    <label>3) فلاتر</label>
    <label>سطوع</label>
    <input id="brightness" type="range" min="50" max="160" value="100">

    <label>تباين</label>
    <input id="contrast" type="range" min="50" max="180" value="100">

    <label>ألوان</label>
    <input id="saturation" type="range" min="0" max="220" value="100">

    <div class="grid">
      <button id="btnCinema" class="purple" type="button">فلتر سينمائي</button>
      <button id="btnReset" type="button">إعادة ضبط</button>
    </div>

    <p class="small">
      ملاحظة: على iPhone لو الفيديو 4K كبير أو MOV تقيل ممكن سفاري يتأخر. جرّب أولًا فيديو قصير MP4 للتأكد.
    </p>
  </section>
</main>

<script>
(function(){
  "use strict";

  var fileInput = document.getElementById("fileInput");
  var video = document.getElementById("video");
  var placeholder = document.getElementById("placeholder");
  var overlayText = document.getElementById("overlayText");
  var status = document.getElementById("status");
  var playhead = document.getElementById("playhead");

  var startTime = 0;
  var endTime = 0;
  var currentUrl = "";

  function write(msg){
    status.innerHTML = msg;
  }

  function fmt(t){
    if(!isFinite(t)) return "00:00";
    var m = Math.floor(t / 60);
    var s = Math.floor(t % 60);
    return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
  }

  function hasVideo(){
    return !!video.getAttribute("src");
  }

  function showVideo(){
    placeholder.style.display = "none";
    video.style.display = "block";
  }

  function loadSelectedFile(){
    var f = fileInput.files && fileInput.files[0];

    if(!f){
      write("ما اخترت فيديو.");
      return;
    }

    try{
      if(currentUrl){
        try{ URL.revokeObjectURL(currentUrl); }catch(e){}
      }

      currentUrl = URL.createObjectURL(f);
      video.pause();
      video.src = currentUrl;
      video.load();
      showVideo();

      write(
        "تم اختيار الفيديو ✅<br>" +
        "الاسم: " + f.name + "<br>" +
        "الحجم: " + Math.round(f.size / 1024 / 1024) + " MB<br>" +
        "النوع: " + (f.type || "غير معروف") + "<br>" +
        "استنى ثواني ثم اضغط تشغيل."
      );
    }catch(e){
      write("خطأ بتحميل الفيديو: " + e.message);
    }
  }

  function playVideo(){
    if(!hasVideo()){
      alert("اختار فيديو أولاً");
      return;
    }
    showVideo();
    var p = video.play();
    if(p && p.then){
      p.then(function(){
        write("الفيديو شغال ▶️");
      }).catch(function(){
        write("المتصفح منع التشغيل التلقائي. اضغط زر التشغيل الصغير داخل الفيديو نفسه.");
      });
    }
  }

  function pauseVideo(){
    video.pause();
    write("تم إيقاف الفيديو ⏸️");
  }

  function jump(sec){
    if(!hasVideo()){
      alert("اختار فيديو أولاً");
      return;
    }
    var dur = video.duration || 0;
    video.currentTime = Math.max(0, Math.min(dur, (video.currentTime || 0) + sec));
    write("الوقت الحالي: " + fmt(video.currentTime));
  }

  function setStart(){
    if(!hasVideo()){
      alert("اختار فيديو أولاً");
      return;
    }
    startTime = video.currentTime || 0;
    write("تم تحديد بداية القص: " + fmt(startTime));
  }

  function setEnd(){
    if(!hasVideo()){
      alert("اختار فيديو أولاً");
      return;
    }
    endTime = video.currentTime || video.duration || 0;
    write("تم تحديد نهاية القص: " + fmt(endTime));
  }

  function playTrim(){
    if(!hasVideo()){
      alert("اختار فيديو أولاً");
      return;
    }
    if(!endTime || endTime <= startTime){
      endTime = video.duration || 0;
    }
    video.currentTime = startTime || 0;
    playVideo();
    write("تشغيل الجزء من " + fmt(startTime) + " إلى " + fmt(endTime));
  }

  function updatePlayhead(){
    var dur = video.duration || 0;
    if(dur){
      var p = Math.max(0, Math.min(100, (video.currentTime / dur) * 100));
      playhead.style.right = p + "%";
    }
    if(endTime && video.currentTime >= endTime && !video.paused){
      video.pause();
      write("وصلنا لنهاية القص: " + fmt(endTime));
    }
  }

  function applyText(){
    var text = document.getElementById("textInput").value.trim();
    var size = document.getElementById("textSize").value;
    var pos = document.getElementById("textPosition").value;

    overlayText.textContent = text;
    overlayText.style.fontSize = size + "px";
    overlayText.style.top = pos + "%";
    overlayText.style.display = text ? "block" : "none";
    write("تم تطبيق النص ✅");
  }

  function clearText(){
    document.getElementById("textInput").value = "";
    overlayText.textContent = "";
    overlayText.style.display = "none";
    write("تم حذف النص.");
  }

  function applyFilters(){
    video.style.setProperty("--brightness", document.getElementById("brightness").value / 100);
    video.style.setProperty("--contrast", document.getElementById("contrast").value / 100);
    video.style.setProperty("--saturation", document.getElementById("saturation").value / 100);
  }

  function cinema(){
    document.getElementById("brightness").value = 95;
    document.getElementById("contrast").value = 130;
    document.getElementById("saturation").value = 120;
    applyFilters();
    write("تم تطبيق فلتر سينمائي ✅");
  }

  function resetAll(){
    startTime = 0;
    endTime = video.duration || 0;

    document.getElementById("brightness").value = 100;
    document.getElementById("contrast").value = 100;
    document.getElementById("saturation").value = 100;
    applyFilters();
    clearText();

    if(hasVideo()){
      video.currentTime = 0;
    }
    write("تمت إعادة الضبط ✅");
  }

  function testButtons(){
    write("الأزرار شغالة ✅ النسخة V4 مفعلة. الآن اختار فيديو قصير وجرب تشغيل.");
    alert("الأزرار شغالة ✅");
  }

  fileInput.addEventListener("change", loadSelectedFile, false);

  video.addEventListener("loadedmetadata", function(){
    endTime = video.duration || 0;
    showVideo();
    write("الفيديو جاهز ✅<br>المدة: " + fmt(video.duration) + "<br>اضغط تشغيل.");
  }, false);

  video.addEventListener("canplay", function(){
    showVideo();
  }, false);

  video.addEventListener("timeupdate", updatePlayhead, false);

  video.addEventListener("error", function(){
    showVideo();
    write(
      "الفيديو ما اشتغل ❌<br>" +
      "جرّب فيديو MP4 قصير، أو فيديو أقل من 4K.<br>" +
      "لو من iPhone بصيغة MOV ممكن يكون ثقيل على المتصفح."
    );
  }, false);

  document.getElementById("btnTest").addEventListener("click", testButtons, false);
  document.getElementById("btnPlay").addEventListener("click", playVideo, false);
  document.getElementById("btnPause").addEventListener("click", pauseVideo, false);
  document.getElementById("btnBack").addEventListener("click", function(){ jump(-5); }, false);
  document.getElementById("btnForward").addEventListener("click", function(){ jump(5); }, false);
  document.getElementById("btnStart").addEventListener("click", setStart, false);
  document.getElementById("btnEnd").addEventListener("click", setEnd, false);
  document.getElementById("btnPlayTrim").addEventListener("click", playTrim, false);
  document.getElementById("btnApplyText").addEventListener("click", applyText, false);
  document.getElementById("btnClearText").addEventListener("click", clearText, false);
  document.getElementById("btnCinema").addEventListener("click", cinema, false);
  document.getElementById("btnReset").addEventListener("click", resetAll, false);

  document.getElementById("textSize").addEventListener("input", applyText, false);
  document.getElementById("textPosition").addEventListener("input", applyText, false);
  document.getElementById("brightness").addEventListener("input", applyFilters, false);
  document.getElementById("contrast").addEventListener("input", applyFilters, false);
  document.getElementById("saturation").addEventListener("input", applyFilters, false);

  applyFilters();
})();
</script>
</body>
</html>
