.card small{display:block;color:#aeb6c8;font-size:11px;margin-top:3px}
.card.active,.card:active{border-color:var(--green);color:var(--green);box-shadow:0 0 0 1px rgba(22,245,163,.45) inset}
.card.danger{border-color:#783045;color:#ffb1c4}
label{display:block;margin:12px 0 7px;color:#d9dee9;font-size:13px}
textarea,input,select{width:100%;background:#07090d;color:#fff;border:1px solid #313746;border-radius:12px;padding:10px;outline:none}
textarea{min-height:78px;resize:vertical}
.bigBtn{width:100%;height:46px;border-radius:13px;background:linear-gradient(135deg,#16f5a3,#22f0c0);color:#00120d;font-weight:900;margin-top:12px}
.darkBtn{width:100%;height:46px;border-radius:13px;background:#222733;color:#fff;font-weight:800;margin-top:8px;border:1px solid #373e4d}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rangeRow{display:grid;grid-template-columns:82px 1fr 52px;gap:8px;align-items:center;margin:10px 0}
.rangeRow input{padding:0}.rangeRow span{font-size:12px;color:#dbe1ee;text-align:center}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;place-items:center;z-index:90;padding:18px}
.modal.show{display:grid}
.box{width:min(92vw,430px);background:#121620;border:1px solid #3a4050;border-radius:20px;padding:18px;color:#fff}
.box h2{margin:0 0 8px}.box p{line-height:1.6;color:#c7cfdd;font-size:13px}progress{width:100%;height:18px}
.download{display:flex;align-items:center;justify-content:center;height:44px;border-radius:12px;background:#eafffd;color:#00120d;text-decoration:none;font-weight:900;margin-top:12px}
.note{font-size:12px;color:#aeb6c8;line-height:1.55;margin-top:10px}
.hidden{display:none!important}

.z-trim-start{left:7%;top:65.1%;width:12%;height:5.8%}.z-trim-end{left:22%;top:65.1%;width:12%;height:5.8%}.z-split{left:39%;top:65.1%;width:12%;height:5.8%}.z-copy{left:54%;top:65.1%;width:12%;height:5.8%}.z-delete{left:68%;top:65.1%;width:12%;height:5.8%}.z-order{left:83%;top:65.1%;width:12%;height:5.8%}
.z-ratio-916{left:3.5%;top:77%;width:10.5%;height:9%}.z-ratio-169{left:14.8%;top:78.2%;width:11%;height:7.8%}.z-ratio-11{left:27.4%;top:78.2%;width:10.8%;height:7.8%}.z-ratio-45{left:40.1%;top:78.2%;width:10%;height:7.8%}.z-ratio-34{left:51.5%;top:78.2%;width:10%;height:7.8%}.z-ratio-219{left:62.7%;top:78.2%;width:9.5%;height:7.8%}

.z-dock-edit{left:0%;bottom:0;width:7.7%;height:6%}.z-dock-audio{left:7.7%;bottom:0;width:7.7%;height:6%}.z-dock-text{left:15.4%;bottom:0;width:7.7%;height:6%}.z-dock-effects{left:23.1%;bottom:0;width:7.7%;height:6%}.z-dock-filters{left:30.8%;bottom:0;width:7.7%;height:6%}.z-dock-templates{left:38.5%;bottom:0;width:7.7%;height:6%}.z-dock-stickers{left:46.2%;bottom:0;width:7.7%;height:6%}.z-dock-captions{left:53.9%;bottom:0;width:7.7%;height:6%}.z-dock-format{left:61.6%;bottom:0;width:7.7%;height:6%}.z-dock-crop{left:69.3%;bottom:0;width:7.7%;height:6%}.z-dock-speed{left:77%;bottom:0;width:7.7%;height:6%}.z-dock-adjust{left:84.7%;bottom:0;width:7.7%;height:6%}.z-dock-project{left:92.4%;bottom:0;width:7.6%;height:6%}

<script>
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const uid = () => Math.random().toString(36).slice(2,10);

let db = null, urls = new Map(), history = [], future = [], lastSpeech = "";
let state = {
  aspect:"9:16", quality:2160, fps:30, fit:"contain",
  assets:[], clips:[], selectedClipId:null, activeTrack:"video",
  textItems:[{id:"main",type:"text",text:"صنع حلمك",x:50,y:34,size:44,color:"#fff",start:0,duration:999,rotate:0,selected:true}],
  audioName:"Dreamy City - LoFi Beat", audioMuted:false, trackVisible:{video:true,text:true,audio:true}
};
const video = $("#realVideo");

function toast(t){const el=$("#toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1600)}
function fmt(t){if(!isFinite(t))return"00:00.00";let m=Math.floor(t/60).toString().padStart(2,"0"),s=(t%60).toFixed(2).padStart(5,"0");return `${m}:${s}`}
function selectedClip(){return state.clips.find(c=>c.id===state.selectedClipId)||null}
function selectedIndex(){return state.clips.findIndex(c=>c.id===state.selectedClipId)}
function assetById(id){return state.assets.find(a=>a.id===id)||null}
function clipLen(c){return Math.max(.05,(c.out-c.inp)/Math.max(.1,c.speed))}
function totalLen(){return state.clips.reduce((a,c)=>a+clipLen(c),0)}
function projectTime(){let c=selectedClip(); if(!c)return 8.62; let t=0,i=selectedIndex(); for(let x=0;x<i;x++)t+=clipLen(state.clips[x]); return t+Math.max(0,(video.currentTime-c.inp)/Math.max(.1,c.speed))}
function snapshot(){return JSON.stringify(simpleState())}
function saveSnap(){history.push(snapshot()); if(history.length>30)history.shift(); future=[]}
function simpleState(){return {
  aspect:state.aspect,quality:state.quality,fps:state.fps,fit:state.fit,
  clips:state.clips,textItems:state.textItems,selectedClipId:state.selectedClipId,
  audioName:state.audioName,audioMuted:state.audioMuted,trackVisible:state.trackVisible,
  assets:state.assets.map(({file,...a})=>a)
}}

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open("sheikh-cat-full-working-db",1);r.onupgradeneeded=()=>{let d=r.result;if(!d.objectStoreNames.contains("files"))d.createObjectStore("files")};r.onsuccess=()=>{db=r.result;res(db)};r.onerror=()=>rej(r.error)})}
async function ensureDB(){if(!db)await openDB()}
function putFile(id,file){return new Promise((res,rej)=>{let tx=db.transaction("files","readwrite");tx.objectStore("files").put(file,id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
function getFile(id){return new Promise((res,rej)=>{let tx=db.transaction("files","readonly"),r=tx.objectStore("files").get(id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error)})}
function objUrl(a){if(!a||!a.file)return""; if(!urls.has(a.id))urls.set(a.id,URL.createObjectURL(a.file)); return urls.get(a.id)}
function getMeta(file){return new Promise(res=>{let v=document.createElement("video");v.preload="metadata";v.src=URL.createObjectURL(file);v.onloadedmetadata=()=>{let m={duration:v.duration||5,width:v.videoWidth||1920,height:v.videoHeight||1080};URL.revokeObjectURL(v.src);res(m)};v.onerror=()=>res({duration:5,width:1920,height:1080})})}
function makeClip(a){return {id:uid(),assetId:a.id,name:a.name,inp:0,out:a.duration||5,speed:1,volume:1,muted:false,brightness:1,contrast:1,saturate:1,blur:0,hue:0,sepia:0,grayscale:0,scale:1,rotate:0,posX:0,posY:0}}

async function importFiles(files){
  await ensureDB(); saveSnap();
  for(const file of files){
    if(!file.type.startsWith("video/")) continue;
    let m=await getMeta(file);
    let a={id:uid(),name:file.name,type:file.type,size:file.size,duration:m.duration,width:m.width,height:m.height,file};
    state.assets.push(a); await putFile(a.id,file);
    let c=makeClip(a); state.clips.push(c); state.selectedClipId=c.id;
  }
  if(selectedClip()) loadClip(selectedClip(),false);
  render(); saveProject(false); toast("تمت إضافة الفيديو")
}
function loadClip(c,autoplay=false){
  let a=assetById(c.assetId); if(!a){toast("ملف الفيديو ناقص");return}
  let u=objUrl(a); if(video.src!==u) video.src=u;
  state.selectedClipId=c.id; video.style.display="block";
  video.currentTime=Math.min(Math.max(c.inp,0),Math.max(c.inp,c.out-.05));
  applyLook(); render(); if(autoplay) video.play().catch(()=>{})
}
function applyLook(){
  let c=selectedClip(); if(!c)return;
  video.style.objectFit=state.fit;
  video.style.filter=`brightness(${c.brightness}) contrast(${c.contrast}) saturate(${c.saturate}) blur(${c.blur}px) hue-rotate(${c.hue}deg) sepia(${c.sepia}) grayscale(${c.grayscale})`;
  video.style.transform=`translate(${c.posX}px,${c.posY}px) scale(${c.scale}) rotate(${c.rotate}deg)`;
  video.volume=(c.muted||state.audioMuted)?0:c.volume; video.muted=(c.muted||state.audioMuted); video.playbackRate=c.speed;
}
function render(){renderText(); renderTime(); updateProgress(); applyLook();}
function renderText(){
  const layer=$("#textLayer"); layer.innerHTML="";
  if(!state.trackVisible.text) return;
  const c=selectedClip(); const lt=c?Math.max(0,video.currentTime-c.inp):0;
  state.textItems.forEach(t=>{
    const visible = lt>=t.start && lt<=t.start+t.duration;
    const el=document.createElement("div");
    el.className="textItem"+(t.type==="sticker"?" stickerItem":"")+(t.selected?" sel":"");
    el.textContent=t.text;
    el.style.left=t.x+"%"; el.style.top=t.y+"%"; el.style.fontSize=t.size+"px"; el.style.color=t.color;
    el.style.opacity=visible||!c?1:.3; el.style.transform=`translate(-50%,-50%) rotate(${t.rotate||0}deg)`;
    el.onpointerdown=e=>dragText(e,t.id);
    el.onclick=e=>{e.stopPropagation();selectText(t.id)};
    layer.appendChild(el);
  })
}
function selectText(id){state.textItems.forEach(x=>x.selected=x.id===id);renderText()}
function activeText(){return state.textItems.find(x=>x.selected)||state.textItems[0]}
function dragText(e,id){
  e.preventDefault(); let item=state.textItems.find(x=>x.id===id); if(!item)return;
  selectText(id);
  const r=$("#textLayer").getBoundingClientRect();
  const move=ev=>{item.x=Math.max(0,Math.min(100,(ev.clientX-r.left)/r.width*100)); item.y=Math.max(0,Math.min(100,(ev.clientY-r.top)/r.height*100)); renderText()};
  const up=()=>{window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",up);saveProject(false)};
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
}
function renderTime(){$("#timeText").textContent=`${fmt(projectTime())} / ${fmt(totalLen()||24.15)}`}
function updateProgress(){let total=totalLen()||24.15, t=projectTime(); let p=Math.min(1,t/total); $("#clipFill").style.width=(p*71)+"%"; $("#playhead").style.left=(16+p*76)+"%"}
async function saveProject(show=true){localStorage.setItem("sheikh-cat-full-working-project",JSON.stringify(simpleState())); $("#status").textContent="آخر حفظ: الآن"; if(show)toast("تم الحفظ")}
async function loadProject(){
  await ensureDB();
  let raw=localStorage.getItem("sheikh-cat-full-working-project"); if(!raw){render();return}
  let s=JSON.parse(raw), assets=[];
  for(const a of s.assets||[]){let file=await getFile(a.id); if(file) assets.push({...a,file})}
  state={...state,...s,assets};
  if(selectedClip()) loadClip(selectedClip(),false);
  render(); toast("تم فتح المشروع")
}

function trimStart(){let c=selectedClip(); if(!c)return toast("أضف فيديو"); saveSnap(); c.inp=Math.min(video.currentTime,c.out-.2); render(); saveProject(false); toast("قص البداية")}
function trimEnd(){let c=selectedClip(); if(!c)return toast("أضف فيديو"); saveSnap(); c.out=Math.max(video.currentTime,c.inp+.2); render(); saveProject(false); toast("قص النهاية")}
function splitClip(){let c=selectedClip(); if(!c)return toast("أضف فيديو"); let t=video.currentTime; if(t<=c.inp+.2||t>=c.out-.2)return toast("حط المؤشر بنص المقطع"); saveSnap(); let a={...c,id:uid(),out:t}, b={...c,id:uid(),inp:t}; let i=selectedIndex(); state.clips.splice(i,1,a,b); loadClip(b,false); saveProject(false); toast("تقسيم")}
function copyClip(){let c=selectedClip(); if(!c)return toast("أضف فيديو"); saveSnap(); let d={...c,id:uid(),name:c.name+" نسخة"}; state.clips.splice(selectedIndex()+1,0,d); loadClip(d,false); saveProject(false); toast("نسخ")}
function deleteClip(){let i=selectedIndex(); if(i<0)return; saveSnap(); state.clips.splice(i,1); state.selectedClipId=state.clips[Math.max(0,i-1)]?.id||null; if(selectedClip())loadClip(selectedClip(),false); else {video.removeAttribute("src"); video.style.display="none"} render(); saveProject(false); toast("حذف")}
function orderClip(dir=1){let i=selectedIndex(),j=i+dir; if(i<0||j<0||j>=state.clips.length)return toast("ما في مقطع للنقل"); saveSnap(); [state.clips[i],state.clips[j]]=[state.clips[j],state.clips[i]]; render(); saveProject(false); toast("ترتيب")}
function undo(){if(!history.length)return toast("ما في تراجع"); future.push(snapshot()); restore(JSON.parse(history.pop())); toast("تراجع")}
function redo(){if(!future.length)return toast("ما في إعادة"); history.push(snapshot()); restore(JSON.parse(future.pop())); toast("إعادة")}
function restore(s){state={...state,...s,assets:state.assets}; if(selectedClip())loadClip(selectedClip(),false); render(); saveProject(false)}

function addText(text,size=44,color="#fff",type="text"){state.textItems.forEach(x=>x.selected=false);state.textItems.push({id:uid(),type,text,x:50,y:38,size,color,start:0,duration:999,rotate:0,selected:true});render();saveProject(false);toast("أضفت عنصر")}
function editSelectedText(){let t=activeText(); if(!t)return toast("اختار نص"); let v=prompt("النص",t.text); if(v!==null){t.text=v; render(); saveProject(false)}}
function delSelectedText(){let i=state.textItems.findIndex(x=>x.selected); if(i>=0){state.textItems.splice(i,1);render();saveProject(false);toast("حذف النص")}}
function rotateSelected(){let t=activeText(); if(!t)return; t.rotate=(t.rotate||0)+15; render(); saveProject(false); toast("تدوير")}
function autoMove(){let t=activeText(); if(!t)return toast("اختار نص"); t.x=t.x===50?62:50; t.y=t.y===34?42:34; render(); saveProject(false); toast("تحريك تلقائي")}
function motionTrack(){let t=activeText(); if(!t)return toast("اختار نص"); let start=performance.now(), base=t.x; function step(now){let k=Math.min(1,(now-start)/900);t.x=base+Math.sin(k*Math.PI*2)*8;renderText(); if(k<1)requestAnimationFrame(step); else saveProject(false)} requestAnimationFrame(step); toast("تتبع حركة بسيط")}

const FILTERS = {
 normal:{b:1,c:1,s:1,bl:0,h:0,sep:0,g:0},
 cinema:{b:.9,c:1.35,s:1.1,bl:0,h:0,sep:.05,g:0},
 warm:{b:1.05,c:1.08,s:1.32,bl:0,h:10,sep:.08,g:0},

function applyFilter(name){let c=selectedClip(); if(!c)return toast("أضف فيديو"); let f=FILTERS[name]||FILTERS.normal; Object.assign(c,{brightness:f.b,contrast:f.c,saturate:f.s,blur:f.bl,hue:f.h,sepia:f.sep,grayscale:f.g}); applyLook(); saveProject(false); toast("فلتر "+name)}
function effect(name){
  let c=selectedClip(); if(!c)return toast("أضف فيديو");
  if(name==="zoom") c.scale+=.15;
  if(name==="spin") c.rotate+=10;
  if(name==="blur") c.blur=Math.min(16,c.blur+2);
  if(name==="flash") c.brightness=1.55;
  if(name==="shake") c.rotate+=3;
  if(name==="fade") c.brightness=.75;
  if(name==="glow"){c.brightness=1.18;c.contrast=1.35;c.saturate=1.4}
  if(name==="mirror"){c.scale*=-1}
  if(name==="reset") resetClip();
  applyLook(); saveProject(false); toast("مؤثر "+name)
}
function resetClip(){let c=selectedClip(); if(!c)return; Object.assign(c,{speed:1,volume:1,muted:false,brightness:1,contrast:1,saturate:1,blur:0,hue:0,sepia:0,grayscale:0,scale:1,rotate:0,posX:0,posY:0}); applyLook(); saveProject(false); toast("رجّعت الضبط")}
function setQuality(q){state.quality=Number(q); toast("الجودة "+q); saveProject(false)}
function setRatio(r){state.aspect=r; toast("المقاس "+r); saveProject(false)}
function setSpeed(v){let c=selectedClip(); if(!c)return toast("أضف فيديو"); c.speed=v; applyLook(); saveProject(false); toast(v+"x")}
function setFit(f){state.fit=f; applyLook(); saveProject(false); toast(f==="cover"?"Fill/Crop":"Fit")}
function toggleMute(){let c=selectedClip(); if(!c)return; c.muted=!c.muted; applyLook(); saveProject(false); toast(c.muted?"كتم":"صوت")}
function toggleTrack(track){state.trackVisible[track]=!state.trackVisible[track]; if(track==="video")video.style.opacity=state.trackVisible.video?1:0; render(); toast((state.trackVisible[track]?"إظهار ":"إخفاء ")+track); saveProject(false)}
function applyTemplate(t){
  if(t==="tiktok"){state.aspect="9:16";state.quality=2160;addText("صنع حلمك",44,"#fff")}
  if(t==="youtube"){state.aspect="16:9";state.quality=1080;addText("عنوان يوتيوب",42,"#fff")}
  if(t==="reels"){state.aspect="9:16";state.quality=2160;applyFilter("vlog")}
  if(t==="cinema"){state.aspect="21:9";applyFilter("cinema")}
  if(t==="promo"){addText("عرض خاص",42,"#16f5a3");applyFilter("neon")}
  if(t==="story"){addText("ستوري جديد",46,"#fff")}
  toast("قالب "+t); saveProject(false)
}
function speakText(){if(!("speechSynthesis" in window))return toast("الصوت غير مدعوم"); let u=new SpeechSynthesisUtterance($("#ttsText")?.value||"صنع حلمك"); u.lang="ar"; speechSynthesis.speak(u); toast("تشغيل صوت النص")}
function startSpeech(){let R=window.SpeechRecognition||window.webkitSpeechRecognition; if(!R){$("#speechOut").textContent="المتصفح لا يدعم التسجيل";return} let r=new R(); r.lang="ar"; r.interimResults=false; r.onresult=e=>{lastSpeech=e.results[0][0].transcript; $("#speechOut").textContent=lastSpeech; addText(lastSpeech,28,"#fff");}; r.onerror=()=>toast("فشل التسجيل"); r.start(); toast("اسمعني")}
function translateCaption(){addText("Dream your life",28,"#28e9ff");toast("أضفت ترجمة تجريبية")}

const panels = {

 templates:["قوالب",`<div class="grid"><button class="card active" onclick="applyTemplate('tiktok')">TikTok 4K</button><button class="card" onclick="applyTemplate('youtube')">YouTube</button><button class="card" onclick="applyTemplate('reels')">Reels</button><button class="card" onclick="applyTemplate('cinema')">Cinema</button><button class="card" onclick="applyTemplate('promo')">Promo</button><button class="card" onclick="applyTemplate('story')">Story</button></div>`],
 stickers:["ستيكرات",`<div class="grid4">${["🔥","✨","❤️","✅","👑","🚀","💯","🎬","😂","⭐","📍","💥","🌙","☀️","🎧","📸"].map(x=>`<button class="card" onclick="addText('${x}',52,'#fff','sticker')">${x}</button>`).join("")}</div>`],

 format:["المقاس والجودة",`<div class="grid"><button class="card active" onclick="setRatio('9:16')">9:16<small>تيك توك</small></button><button class="card" onclick="setRatio('16:9')">16:9</button><button class="card" onclick="setRatio('1:1')">1:1</button><button class="card" onclick="setRatio('4:5')">4:5</button><button class="card" onclick="setRatio('3:4')">3:4</button><button class="card" onclick="setRatio('21:9')">21:9</button><button class="card" onclick="setQuality(720)">HD</button><button class="card" onclick="setQuality(1080)">FHD</button><button class="card" onclick="setQuality(1440)">2K</button><button class="card active" onclick="setQuality(2160)">4K</button></div>`],
 crop:["القص",`<div class="grid"><button class="card active" onclick="setFit('contain')">Fit</button><button class="card" onclick="setFit('cover')">Fill/Crop</button></div><div id="cropSliders"></div>`],
 speed:["السرعة",`<div class="grid"><button class="card" onclick="setSpeed(.25)">0.25x</button><button class="card" onclick="setSpeed(.5)">0.5x</button><button class="card active" onclick="setSpeed(1)">1x</button><button class="card" onclick="setSpeed(1.5)">1.5x</button><button class="card" onclick="setSpeed(2)">2x</button><button class="card" onclick="setSpeed(3)">3x</button></div>`],

 stt:["تحويل كلام إلى نص",`<button class="bigBtn" onclick="startSpeech()">ابدأ التسجيل من المايك</button><p id="speechOut" class="note">النص يظهر هنا، وبعدها يضاف ككابشن.</p>`],

};
function openPanel(name){let p=panels[name]; if(!p)return; $("#panelTitle").textContent=p[0]; $("#panelBody").innerHTML=p[1]; $("#panel").classList.add("show"); afterPanel(name)}
function afterPanel(name){
  let c=selectedClip();
  if(name==="adjust") makeSliders("adjustSliders",[["brightness","سطوع",.2,2.2,.01],["contrast","تباين",.2,2.2,.01],["saturate","تشبع",0,2.8,.01],["blur","تمويه",0,16,.2],["hue","ألوان",-180,180,1],["sepia","سيبيا",0,1,.01],["grayscale","أبيض/أسود",0,1,.01]]);
  if(name==="crop") makeSliders("cropSliders",[["scale","تكبير",.3,3,.01],["rotate","دوران",-180,180,1],["posX","تحريك X",-300,300,1],["posY","تحريك Y",-300,300,1]]);
  if(name==="audio") makeSliders("audioSliders",[["volume","الصوت",0,1,.01]]);
}
function makeSliders(target,props){
  let c=selectedClip(); const box=$("#"+target); if(!box)return;
  box.innerHTML=props.map(([id,l,min,max,step])=>`<div class="rangeRow"><span>${l}</span><input id="sl_${id}" type="range" min="${min}" max="${max}" step="${step}" value="${c?c[id]??1:1}"><span id="vl_${id}">${c?Number(c[id]??1).toFixed(1):""}</span></div>`).join("");
  props.forEach(([id])=>{const el=$("#sl_"+id); if(el)el.oninput=e=>{let c=selectedClip();if(!c)return;c[id]=Number(e.target.value);$("#vl_"+id).textContent=Number(e.target.value).toFixed(id==="rotate"||id==="posX"||id==="posY"||id==="hue"?0:1);applyLook();saveProject(false)}});
}

function waitEvent(el,event,timeout=2500){return new Promise(res=>{let done=()=>{clearTimeout(timer);el.removeEventListener(event,done);res()};let timer=setTimeout(done,timeout);el.addEventListener(event,done)})}
async function seek(t){if(Math.abs(video.currentTime-t)<.05)return;video.currentTime=t;await waitEvent(video,"seeked")}
function exportSize(){let q=Number(state.quality||2160),a=state.aspect;if(a==="9:16")return[q,Math.round(q*16/9)];if(a==="16:9")return[Math.round(q*16/9),q];if(a==="1:1")return[q,q];if(a==="4:5")return[q,Math.round(q*5/4)];if(a==="3:4")return[q,Math.round(q*4/3)];if(a==="21:9")return[Math.round(q*21/9),q];return[q,Math.round(q*16/9)]}
function drawVideo(ctx,c,w,h){let iw=video.videoWidth||1920,ih=video.videoHeight||1080,sc=state.fit==="cover"?Math.max(w/iw,h/ih):Math.min(w/iw,h/ih),dw=iw*sc,dh=ih*sc;ctx.save();ctx.translate(w/2+c.posX,h/2+c.posY);ctx.rotate((c.rotate||0)*Math.PI/180);ctx.scale(c.scale||1,c.scale||1);ctx.filter=`brightness(${c.brightness}) contrast(${c.contrast}) saturate(${c.saturate}) blur(${c.blur}px) hue-rotate(${c.hue}deg) sepia(${c.sepia}) grayscale(${c.grayscale})`;ctx.drawImage(video,-dw/2,-dh/2,dw,dh);ctx.restore();ctx.filter="none"}
function drawText(ctx,w,h){if(!state.trackVisible.text)return;state.textItems.forEach(t=>{ctx.save();ctx.translate(t.x/100*w,t.y/100*h);ctx.rotate((t.rotate||0)*Math.PI/180);ctx.font=`900 ${Math.max(16,t.size*(w/360))}px Arial,Tahoma`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle=t.color;ctx.shadowColor="rgba(0,0,0,.9)";ctx.shadowBlur=18;ctx.shadowOffsetY=4;String(t.text).split("\\n").forEach((line,i,arr)=>ctx.fillText(line,0,(i-(arr.length-1)/2)*t.size*(w/360)*1.15));ctx.restore()})}
async function exportVideo(){
  if(!state.clips.length)return toast("أضف فيديو أولاً");
  if(!HTMLCanvasElement.prototype.captureStream||!window.MediaRecorder){alert("المتصفح لا يدعم التصدير. ارفعه GitHub Pages وافتحه بمتصفح حديث.");return}
  $("#exportModal").classList.add("show");$("#downloadLink").style.display="none";
  let [w,h]=exportSize(),canvas=$("#canvas"),ctx=canvas.getContext("2d");canvas.width=w;canvas.height=h;
  let stream=canvas.captureStream(state.fps), mixed=new MediaStream([...stream.getVideoTracks()]);
  try{if(video.captureStream&&!state.audioMuted)video.captureStream().getAudioTracks().forEach(t=>mixed.addTrack(t))}catch(e){}
  let m=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4","video/webm;codecs=vp9","video/webm"].find(x=>MediaRecorder.isTypeSupported(x))||"video/webm";
  let ext=m.includes("mp4")?"mp4":"webm", rec;
  try{rec=new MediaRecorder(mixed,{mimeType:m,videoBitsPerSecond:w*h>8000000?30000000:12000000})}catch(e){alert("التصدير غير مدعوم على هذا المتصفح");return}
  let chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};rec.start(300);
  let old=state.selectedClipId,total=totalLen(),done=0;
  for(let i=0;i<state.clips.length;i++){
    let c=state.clips[i],a=assetById(c.assetId);if(!a)continue;state.selectedClipId=c.id;
    let u=objUrl(a);if(video.src!==u)video.src=u;if(video.readyState<1)await waitEvent(video,"loadedmetadata");
    await seek(c.inp);video.playbackRate=c.speed;await video.play().catch(()=>{});
    while(video.currentTime<c.out-.03&&!video.ended){
      ctx.fillStyle="#000";ctx.fillRect(0,0,w,h); if(state.trackVisible.video)drawVideo(ctx,c,w,h); drawText(ctx,w,h);
      let pct=Math.min(99,(done+(video.currentTime-c.inp)/c.speed)/Math.max(.1,total)*100);
      $("#exportProgress").value=pct;$("#exportMsg").textContent=`تصدير ${i+1}/${state.clips.length} — ${Math.round(pct)}% — ${w}×${h}`;
      await new Promise(requestAnimationFrame)
    }
    video.pause();done+=clipLen(c)
  }
  rec.stop();await new Promise(r=>rec.onstop=r);
  state.selectedClipId=old;if(selectedClip())loadClip(selectedClip(),false);
  let blob=new Blob(chunks,{type:m}),link=$("#downloadLink");link.href=URL.createObjectURL(blob);link.download=`sheikh-cat-${w}x${h}.${ext}`;link.style.display="flex";
  $("#exportProgress").value=100;$("#exportMsg").textContent=`خلص التصدير ${w}×${h} بصيغة ${ext.toUpperCase()}`;
}

function act(a){
  if(a==="back") toast("رجوع");
  if(a==="add-video") $("#fileInput").click();
  if(a==="save") saveProject(true);
  if(a==="export") exportVideo();
  if(a==="play"){let c=selectedClip(); if(!c)return $("#fileInput").click(); if(video.paused){if(video.currentTime<c.inp||video.currentTime>=c.out)video.currentTime=c.inp;video.play().catch(()=>{})}else video.pause()}
  if(a==="prev"){let i=selectedIndex();if(i>0)loadClip(state.clips[i-1],false);else toast("أول مقطع")}
  if(a==="next"){let i=selectedIndex();if(i>=0&&i<state.clips.length-1)loadClip(state.clips[i+1],true);else toast("آخر مقطع")}
  if(a==="trim-start") trimStart();
  if(a==="trim-end") trimEnd();
  if(a==="split") splitClip();
  if(a==="copy") copyClip();
  if(a==="delete") deleteClip();
  if(a==="order") orderClip(1);
  if(a==="undo") undo();
  if(a==="redo") redo();
  if(a==="fullscreen-preview"||a==="fullscreen-app") document.getElementById("app").requestFullscreen?.();
  if(a==="automove") autoMove();
  if(a==="motion-track") motionTrack();
  if(a==="remove-text") delSelectedText();
  if(a==="edit-text") editSelectedText();
  if(a==="rotate-text") rotateSelected();
  if(a==="select-text"){let t=activeText(); if(t)selectText(t.id)}
  if(a==="timeline") toast("التايملاين شغال");
  if(a==="track-video") toggleTrack("video");
  if(a==="track-text") toggleTrack("text");
  if(a==="track-audio"){state.audioMuted=!state.audioMuted;applyLook();toast(state.audioMuted?"كتم مسار الصوت":"تشغيل مسار الصوت");saveProject(false)}
}

$$(".hot").forEach(b=>b.onclick=()=>{if(b.dataset.act)act(b.dataset.act); if(b.dataset.panel)openPanel(b.dataset.panel); if(b.dataset.ratio)setRatio(b.dataset.ratio); if(b.dataset.quality)setQuality(b.dataset.quality)});
$("#fileInput").onchange=e=>importFiles([...e.target.files]);
$("#audioInput").onchange=e=>{let f=e.target.files[0];if(f){state.audioName=f.name;toast("تم اختيار الصوت")}};
$("#closePanel").onclick=()=>$("#panel").classList.remove("show");
$("#closeExport").onclick=()=>$("#exportModal").classList.remove("show");
video.ontimeupdate=()=>{renderTime();updateProgress();renderText();let c=selectedClip();if(c&&video.currentTime>=c.out-.03&&!video.paused)video.pause()};
ensureDB().then(loadProject).catch(render);
render();
</script>
